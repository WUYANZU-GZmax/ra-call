<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音通话 - RA通话</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ra-container">
        <div class="call-widget" id="callWidget">
            <div class="widget-header">
                <span class="call-title">语音通话请求</span>
                <div class="header-right">
                    <div class="mute-lock-tip" id="muteLockTip">播报期间无法解除静音</div>
                    <button class="mic-btn" id="micBtn" aria-label="静音">
                        <svg class="mic-on" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 14C14.2091 14 16 12.2091 16 10V6C16 3.79086 14.2091 2 12 2C9.79086 2 8 3.79086 8 6V10C8 12.2091 9.79086 14 12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M19 10V11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 18V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M8 22H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <svg class="mic-off" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: none;">
                            <path d="M2 2L22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M6.71 6.71C6.26 7.39 6 8.18 6 9V10C6 13.3137 8.68629 16 12 16C12.82 16 13.61 15.84 14.33 15.55M15.85 11.72C15.95 11.16 16 10.58 16 10V6C16 3.79086 14.2091 2 12 2C10.9 2 9.88 2.37 9.11 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9 9V10C9 11.6569 10.3431 13 12 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M19 10V11C19 14.01 17.11 16.58 14.5 17.61M12 18V22M8 22H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="call-info">
                <span class="caller-id" id="callerId">[L4]k9254 通话中</span>
            </div>
            <div class="call-footer">
                <div class="phone-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 16.92V20C22 20.5523 21.5523 21 21 21C18.4312 21 15.9324 20.4912 13.6504 19.5036C11.5368 18.5825 9.56963 17.281 7.83002 15.6504C6.0904 14.0198 4.60525 12.0807 3.46784 9.92053C2.50498 8.09824 1.8367 6.11874 1.5 4.06C1.41178 3.50341 1.77535 3 2.34 3H6C6.46252 3 6.87548 3.31434 6.97801 3.76812C7.27333 5.07105 7.80425 6.32558 8.555 7.5C8.69321 7.72349 8.66816 8.01253 8.491 8.215L6.921 10.045C8.50813 13.0324 10.9683 15.4923 13.955 17.079L15.785 15.509C15.9875 15.3318 16.2765 15.3068 16.5 15.445C17.6744 16.1958 18.929 16.7267 20.2319 17.022C20.6857 17.1245 21 17.5375 21 18V18.96C21 19.5285 21.476 20 22 20V20C22 20 22 16.92 22 16.92Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="call-duration" id="callDuration">00:17</span>
                <button class="hangup-btn" id="hangupBtn">
                    <span class="hangup-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 16.92V20C22 20.5523 21.5523 21 21 21C18.4312 21 15.9324 20.4912 13.6504 19.5036C11.5368 18.5825 9.56963 17.281 7.83002 15.6504C6.0904 14.0198 4.60525 12.0807 3.46784 9.92053C2.50498 8.09824 1.8367 6.11874 1.5 4.06C1.41178 3.50341 1.77535 3 2.34 3H6C6.46252 3 6.87548 3.31434 6.97801 3.76812C7.27333 5.07105 7.80425 6.32558 8.555 7.5C8.69321 7.72349 8.66816 8.01253 8.491 8.215L6.921 10.045C8.50813 13.0324 10.9683 15.4923 13.955 17.079L15.785 15.509C15.9875 15.3318 16.2765 15.3068 16.5 15.445C17.6744 16.1958 18.929 16.7267 20.2319 17.022C20.6857 17.1245 21 17.5375 21 18V18.96C21 19.5285 21.476 20 22 20V20C22 20 22 16.92 22 16.92Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    挂断
                </button>
            </div>
            <div class="widget-actions">
                <button class="widget-action-btn" id="quickBroadcastBtn">英文播报</button>
                <button class="widget-action-btn" id="subtitleBtn">英文字幕</button>
            </div>
        </div>

        <div class="broadcast-panel" id="broadcastPanel">
            <div class="panel-header">
                <span class="panel-title">EN标准话术快捷播报</span>
                <button class="panel-close" id="closeBroadcastPanel">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="broadcast-tabs">
                <button class="tab-btn active" data-tab="safety">安全警示</button>
                <button class="tab-btn" data-tab="urging">行程催促</button>
                <button class="tab-btn" data-tab="operation">运营问题</button>
                <button class="tab-btn" data-tab="comfort">基础安抚</button>
                <button class="tab-btn" data-tab="custom">手动输入</button>
            </div>

            <div class="broadcast-mute-tip">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 9V13M12 17H12.01M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>播报期间，你将自动被静音</span>
            </div>

            <div class="tab-content active" id="tab-safety">
                <div class="script-list" id="safetyList"></div>
            </div>
            <div class="tab-content" id="tab-urging">
                <div class="script-list" id="urgingList"></div>
            </div>
            <div class="tab-content" id="tab-operation">
                <div class="script-list" id="operationList"></div>
            </div>
            <div class="tab-content" id="tab-comfort">
                <div class="script-list" id="comfortList"></div>
            </div>
            <div class="tab-content" id="tab-custom">
                <div class="custom-translate">
                    <div class="input-row">
                        <label class="input-label">输入中文</label>
                        <div class="input-wrapper">
                            <textarea class="custom-input" id="customInput" placeholder="请输入要翻译的中文内容..." maxlength="50"></textarea>
                            <span class="char-count" id="charCount">0/50</span>
                        </div>
                        <button class="translate-btn" id="translateBtn" disabled>翻译</button>
                    </div>
                    <div class="result-row">
                        <label class="input-label">英文翻译:</label>
                        <div class="translate-result" id="translateResult">
                            <span class="placeholder-text">翻译结果将显示在这里</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="broadcast-status" id="broadcastStatus" style="display: none;">
                <div class="broadcast-status-header">
                    <svg class="broadcasting-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="status-text" id="statusText">播报中...</span>
                    <button class="stop-broadcast-btn" id="stopBroadcastBtn">停止播报</button>
                </div>
                <div class="broadcast-content">
                    <div class="broadcast-content-zh" id="broadcastContentZh"></div>
                    <div class="broadcast-content-en" id="broadcastContentEn"></div>
                </div>
            </div>

            <div class="panel-footer">
                <button class="submit-broadcast-btn" id="submitBroadcastBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 11L22 2L13 21L11 13L3 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>提交并播报</span>
                </button>
            </div>
        </div>

        <div class="auto-open-toast" id="autoOpenToast">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>检测到乘客说英文，自动打开字幕</span>
        </div>

        <div class="subtitle-panel" id="subtitlePanel">
            <div class="subtitle-header">
                <span class="subtitle-title">实时双语字幕</span>
                <button class="panel-close" id="closeSubtitlePanel">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="subtitle-content" id="subtitleContent">
                <div class="subtitle-empty">暂无字幕内容</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
